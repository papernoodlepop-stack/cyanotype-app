<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Editor</title>
<style>
* {
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  box-sizing: border-box;
}
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: #222;
  font-family: sans-serif;
  padding: 20px 0;
}

/* Top UI */
.top-ui {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 25px;
  color: white;
  font-size: 14px;
  z-index: 10;
}
.top-ui span {
  text-align: center;
  line-height: 1.4;
}
.top-ui button {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 5px;
  line-height: 1.2;
}

/* Thumbnails */
.thumb-bar {
  position: absolute;
  top: 75px;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(4, 60px);
  gap: 15px 20px;
}
.thumb {
  width: 60px;
  height: 60px;
  background: white;
  border: 2px solid black;
  cursor: pointer;
}
.thumb.empty {
  background: #777;
}

/* Canvas Container */
.canvas-container {
  position: absolute;
  top: 225px;
  left: 50%;
  transform: translateX(-50%);
}

/* Canvas */
.canvas-wrap {
  width: 88vw;
  max-width: 360px;
  aspect-ratio: 5 / 7;
  background: #888;
  border: 2px solid black;
  overflow: hidden;
  position: relative; /* important */
}

/* Box Objects */
.box {
  position: absolute;
  width: 120px;
  height: 240px;
  touch-action: none;
}
.rotator {
  width: 100%;
  height: 100%;
  transform-origin: center;
}
.image {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

/* Handle */
.handle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 44px;
  height: 44px;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
}
.box.active .handle { opacity: 1; transition: opacity 0.15s ease; }
.handle svg {
  width: 28px;
  height: 28px;
  stroke: black;
  fill: none;
  stroke-width: 2;
}
</style>
</head>
<body>

<div class="top-ui">
  <span>Click, move, rotate.<br>Drag outside to remove</span>
  <button id="finalizeBtn">Finalize &<br>Purchase</button>
</div>

<div class="thumb-bar">
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
</div>

<div class="canvas-container">
  <div class="canvas-wrap" id="canvas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Prevent defaults
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

const thumbs = document.querySelectorAll(".thumb");
const canvas = document.getElementById("canvas");
const thumbLimits = [3,1,2,1,3,1,2,1];
let thumbCounts = [...thumbLimits];

// Example images (replace with your own)
const thumbImages = [
  ['circle.png'], ['sophisticated.png'], ['triangle.png'], ['star.png'],
  ['circle.png'], ['sophisticated.png'], ['triangle.png'], ['star.png']
];

// CREATE BOX
function createBox(x,y,thumbIndex){
  const box = document.createElement("div");
  box.className="box";
  box.style.left=x+"px";
  box.style.top=y+"px";

  const rotator=document.createElement("div");
  rotator.className="rotator";

  const img=document.createElement("div");
  img.className="image";
  img.style.backgroundImage=`url('${thumbImages[thumbIndex][0]}')`;

  const handle=document.createElement("div");
  handle.className="handle";
  handle.innerHTML=`<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 8 16 8"/></svg>`;

  rotator.appendChild(img);
  rotator.appendChild(handle);
  box.appendChild(rotator);

  handle.addEventListener("pointerdown", e=>{e.stopPropagation(); rotate(box,rotator,e);});
  box.addEventListener("pointerdown", e=>{if(!e.target.closest(".handle")) drag(box,e);});

  return box;
}

// DRAG
function drag(box,e){
  box.classList.add("active");
  let ox=e.clientX-box.offsetLeft;
  let oy=e.clientY-box.offsetTop;

  function move(e){ box.style.left=e.clientX-ox+"px"; box.style.top=e.clientY-oy+"px"; }
  function up(){
    document.removeEventListener("pointermove", move);
    document.removeEventListener("pointerup", up);
    box.classList.remove("active");

    const c=canvas.getBoundingClientRect();
    const b=box.getBoundingClientRect();
    const overlapX=Math.max(0, Math.min(b.right,c.right)-Math.max(b.left,c.left));
    const overlapY=Math.max(0, Math.min(b.bottom,c.bottom)-Math.max(b.top,c.top));
    const visibleRatio=(overlapX*overlapY)/(b.width*b.height);
    if(visibleRatio<0.2) returnHome(box);
  }

  document.addEventListener("pointermove", move);
  document.addEventListener("pointerup", up);
}

// ROTATE
function rotate(box, rotator, e) {
  box.classList.add("active");

  // get box center relative to viewport
  const r = box.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;

  // starting angle
  const start = Math.atan2(e.clientY - cy, e.clientX - cx);
  const base = parseFloat(rotator.dataset.r || 0);

  function move(e) {
    const a = Math.atan2(e.clientY - cy, e.clientX - cx);
    const deg = base + (a - start) * (180 / Math.PI);
    rotator.style.transform = `rotate(${deg}deg)`;
    rotator.dataset.r = deg;
  }

  function up() {
    document.removeEventListener("pointermove", move);
    document.removeEventListener("pointerup", up);
    box.classList.remove("active");
  }

  document.addEventListener("pointermove", move);
  document.addEventListener("pointerup", up);
}

// RETURN HOME
function returnHome(box){
  const origin=box.dataset.origin;
  const t=thumbs[origin].getBoundingClientRect();
  box.style.transition="all 0.25s ease";
  box.style.left=t.left+"px";
  box.style.top=t.top+"px";

  setTimeout(()=>{
    box.remove();
    thumbCounts[origin]+=1;
    if(thumbCounts[origin]>0) thumbs[origin].classList.remove("empty");
  },250);
}

// SPAWN THUMB
thumbs.forEach((t,i)=>{
  t.addEventListener("pointerdown", e=>{
    e.preventDefault();
    if(thumbCounts[i]<=0) return;
    thumbCounts[i]-=1;
    if(thumbCounts[i]===0) t.classList.add("empty");

    const x=canvas.clientWidth/2-60;
    const y=canvas.clientHeight/2-120;
    const box=createBox(x,y,i);
    box.dataset.origin=i;
    canvas.appendChild(box);
    drag(box,e);
  });
});

// FINALIZE & CAPTURE
document.getElementById("finalizeBtn").addEventListener("click", async () => {
  const canvasDiv=document.getElementById("canvas");

  // temporarily remove transform for proper capture
  const container = canvasDiv.parentElement;
  const oldTransform = container.style.transform;
  container.style.transform="none";

  const imgCanvas = await html2canvas(canvasDiv,{
    backgroundColor:"#888",
    scale:2,
    allowTaint:true,
    useCORS:true
  });

  container.style.transform=oldTransform;

  const dataUrl=imgCanvas.toDataURL("image/png");
  const win=window.open();
  win.document.write('<img src="'+dataUrl+'" style="width:100%">');
});
</script>

</body>
</html>
